version: 1
name: base
description: "Tum projelere ortak temel kurallar"
languages: []
frameworks: []

claude_md:
  coding_standards: |
    - Type hints zorunlu (tum fonksiyon parametreleri ve donus tipleri)
    - Fonksiyonlar max 30 satir, tek sorumluluk prensibi
    - console.log/print birakma, logger kullan
    - Degisken isimleri aciklayici olsun (x, tmp, data gibi genel isimler yasak)
    - Magic number kullanma, sabitleri UPPER_SNAKE_CASE ile tanimla
    - Tekrar eden kod bloklarini fonksiyona cek (DRY)
  test_command: ""
  lint_command: ""

hooks:
  - name: protect-env.sh
    event: PreToolUse
    matcher: "Edit|Write"
    command: |
      if [[ "$FILE_PATH" == *".env" ]] && [[ "$FILE_PATH" != *".env.example" ]]; then
        echo '{"block": true, "message": "BLOCKED: .env dosyalari duzenlenemez."}' >&2
        exit 2
      fi

  - name: brain-sync.sh
    event: PostToolUse
    matcher: ""
    bundled: true

  - name: session-start.sh
    event: SessionStart
    matcher: ""
    bundled: true

  - name: pre-compact.sh
    event: PreCompact
    matcher: ""
    bundled: true

  - name: qa-gate.sh
    event: Stop
    matcher: ""
    bundled: true

rules:
  - name: no-env-edit.md
    content: |
      ---
      description: .env dosyalarini asla duzenleme
      globs: ["*.env", ".env.*"]
      ---
      ## .env Korumasi
      - .env dosyalarini ASLA duzenleme veya oluşturma
      - Sadece .env.example duzenlenebilir (varsayilan degerlerle, gercek secret'lar olmadan)
      - Yeni bir env degiskeni eklemen gerekirse: .env.example'a ekle ve kullaniciya bildir
      - Secret/token/password iceren degerleri ASLA hardcode yapma

  - name: git-safety.md
    content: |
      ---
      description: Git guvenlik kurallari
      ---
      ## Git Kurallari
      - main/master branch'e direkt push YAPMA
      - Force push KULLANMA
      - Commit oncesi lint ve test calistir, gecmezse commit yapma
      - Commit mesajlari Turkce, imperative, kisa
      - Her commit tek bir is yapsin (atomik commit)
      - .env, credentials, key iceren dosyalari ASLA commit'leme

  - name: code-quality.md
    content: |
      ---
      description: Genel kod kalitesi kurallari
      ---
      ## Kod Kalitesi
      - Yeni dosya olusturmadan once mevcut dosyalarda cozum ara
      - Over-engineering yapma, en basit cozumu uygula
      - Kullanilmayan import, degisken, fonksiyon birakma
      - TODO/FIXME birakiyorsan aciklama ekle
      - Error handling: spesifik exception yakala, bare except YASAK
      - Dosya basina tek sorumluluk, 300+ satir ise bol

  - name: brain-usage.md
    content: |
      ---
      description: Otomatik bellek sistemi kullanim kurallari
      ---
      ## Brain Sistemi
      Bu projede `memory/brain.jsonl` otomatik tutulan bir islem gunlugudur.
      Hook'lar tarafindan her tool kullanimi sonrasi guncellenir.

      ### Icerigi
      - error: Tespit edilen hatalar
      - change: Dosya degisiklikleri (Edit/Write)
      - command: Calistirilan bash komutlari
      - compact: Context sikistirma oncesi ozet
      - qa_warning: QA gate uyarilari

      ### Nasil Kullanilir
      - Session basinda brain.jsonl kontrol et, son hatalari incele
      - Ayni hatayi tekrarlama
      - Bu dosyayi ELLE DUZENLEME, hook'lar otomatik yonetir

skills_include: []
skills_exclude: []

