version: 1
name: base
description: "Tum projelere ortak temel kurallar"
languages: []
frameworks: []

claude_md:
  coding_standards: |
    - Type hints on all function signatures
    - Functions max 30 lines, single responsibility
    - No print/console.log left behind, use logger
    - Descriptive variable names, no x/tmp/data
    - No magic numbers, use UPPER_SNAKE_CASE constants
    - DRY: extract repeated code into functions
  test_command: ""
  lint_command: ""

hooks:
  - name: protect-env.sh
    event: PreToolUse
    matcher: "Edit|Write"
    command: |
      if [[ "$FILE_PATH" == *".env" ]] && [[ "$FILE_PATH" != *".env.example" ]]; then
        echo '{"block": true, "message": "BLOCKED: .env files are read-only."}' >&2
        exit 2
      fi

  - name: brain-sync.sh
    event: PostToolUse
    matcher: ""
    bundled: true

  - name: session-start.sh
    event: SessionStart
    matcher: ""
    bundled: true

  - name: pre-compact.sh
    event: PreCompact
    matcher: ""
    bundled: true

  - name: qa-gate.sh
    event: Stop
    matcher: ""
    bundled: true

rules:
  - name: no-env-edit.md
    content: |
      ---
      description: Never edit .env files
      globs: ["*.env", ".env.*"]
      ---
      Never edit .env files. Only .env.example may be modified (with defaults, no real secrets).

  - name: git-safety.md
    content: |
      ---
      description: Git safety rules
      ---
      - No direct push to main/master
      - No force push
      - Run lint+test before commit
      - Never commit .env, credentials, or key files

  - name: code-quality.md
    content: |
      ---
      description: Code quality rules
      ---
      - Search existing files before creating new ones
      - No over-engineering, simplest solution first
      - No unused imports/variables/functions
      - Specific exception handling only, no bare except
      - Split files over 300 lines

skills_include: []
skills_exclude: []

memory_templates:
  - name: MEMORY.md
    content: |
      # Memory
      Read this at session start. `memory/brain.jsonl` is auto-maintained by hooks.
      ## Decisions
      ## Known Issues
  - name: debugging.md
    content: |
      # Debug Log
      Format: date | issue | root cause | fix
  - name: preferences.md
    content: |
      # Preferences
