    content: |
      # Fullstack Mimari Kararlar

      ## Backend Katman Yapisi
      Route -> Service -> Repository -> Database

      ## Frontend Katman Yapisi
      Page -> Feature Component -> UI Component
      API Layer: TanStack Query -> services/ -> Backend

      ## API Contract
      - Base URL: /api/v1
      - Auth: JWT (httpOnly cookie)
      - Response: {"data": ...} veya {"detail": ..., "code": ...}

      ## Kararlar
      _(Proje ilerledikce buraya eklenir)_

  - name: api-contracts.md
    content: |
      # API Sozlesmeleri

      ## Endpoint Listesi
      | Method | Path | Request | Response | Aciklama |
      |--------|------|---------|----------|----------|
      _(Her yeni endpoint eklendikce buraya yazilir)_

      ## Ortak Response Formati
      Basarili: `{"data": ...}` veya direkt model
      Hata: `{"detail": "Turkce mesaj", "code": "ERROR_CODE"}`
      Validation: 422, `{"detail": [{"field": "...", "msg": "..."}]}`

  - name: shared-decisions.md
    content: |
      # Paylasilan Kararlar

      ## Auth Mekanizmasi
      _(JWT, session, OAuth - projeye gore belirlenir)_

