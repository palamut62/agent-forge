version: 1
name: fastapi
description: "FastAPI + Python async project"
extends: base
languages: [python]
frameworks: [fastapi]

claude_md:
  role: "Senior Python backend developer. Write production-quality async FastAPI code."
  project_overview: "FastAPI REST API with async I/O, Pydantic validation, layered architecture."
  tech_stack: "Python 3.12, FastAPI, httpx, pydantic, SQLAlchemy/SQLModel, alembic"
  coding_standards: |
    - Type hints on all signatures
    - async/await for all I/O operations
    - Pydantic models for request/response (no raw dicts), separate Create/Response schemas
    - httpx.AsyncClient (not requests), reuse client for connection pooling
    - Routes in routes/, business logic in services/, DB in repositories/
    - No business logic in route handlers
    - Dependency injection via Depends(), no global state
    - response_model on every endpoint
    - Correct status codes: 201 create, 204 delete, 404 not found, 422 validation
  architecture: |
    ```
    src/
    ├── main.py           # app, middleware, startup/shutdown
    ├── config.py          # pydantic Settings
    ├── routes/<resource>.py
    ├── services/<resource>.py
    ├── repositories/<resource>.py
    ├── models/schemas.py  # Pydantic models
    ├── models/database.py # SQLAlchemy models
    └── exceptions.py
    ```
  hard_boundaries: |
    - Never edit .env files
    - No direct commits to main/master
    - No endpoints without tests
    - No SQL string concatenation
    - No sync I/O in async context
    - No secrets in API responses
    - No N+1 queries
  error_handling: |
    Custom exceptions in exceptions.py. Register handlers in main.py.
    User-facing messages in Turkish. Never expose stack traces.
  test_command: "pytest tests/ -v --tb=short"
  lint_command: "ruff check --fix && ruff format"

hooks:
  - name: format.sh
    event: PostToolUse
    matcher: "Edit|Write"
    command: |
      if [[ "$FILE_PATH" == *.py ]]; then
        ruff format "$FILE_PATH" 2>/dev/null
        ruff check --fix "$FILE_PATH" 2>/dev/null
      fi

rules:
  - name: async-io.md
    content: |
      ---
      description: Async I/O rules for FastAPI
      ---
      - httpx.AsyncClient not requests
      - asyncio.sleep not time.sleep
      - aiofiles for large file I/O
      - asyncio.gather() for parallel I/O
      - async DB driver (asyncpg/aiosqlite)

  - name: pydantic-models.md
    content: |
      ---
      description: Pydantic model rules
      ---
      - Separate Create/Update/Response schemas
      - `field: str | None = None` for optionals
      - `model_config = ConfigDict(from_attributes=True)` for ORM
      - Field validators for custom validation

  - name: error-handling.md
    content: |
      ---
      description: FastAPI error handling
      ---
      Custom exceptions in exceptions.py with @app.exception_handler.
      Return {"detail": "message"} format. Log internals, hide from user.

  - name: database-rules.md
    content: |
      ---
      description: Database rules
      ---
      - Alembic migration for every schema change
      - No SELECT *, specify columns
      - Use joinedload/selectinload to avoid N+1
      - Transaction boundaries in service layer
      - Prefer soft delete (is_deleted flag)

skills_include:
  - tdd-workflow
  - security-review
  - api-design
  - python-patterns
  - python-testing
  - postgres-patterns
  - docker-patterns
  - backend-patterns
  - database-migrations
  - coding-standards
  - verification-loop
  - deployment-patterns

skills_exclude:
  - "threejs-*"
  - "kotlin-*"
  - "swift-*"
  - "golang-*"
  - "perl-*"
  - "springboot-*"
  - "jpa-*"
  - "compose-*"

memory_templates:
  - name: architecture.md
    content: |
      # Architecture
      Route -> Service -> Repository -> DB. No layer skipping.
  - name: api-contracts.md
    content: |
      # API Contracts
      Success: `{"data": ...}` | Error: `{"detail": "message"}`
  - name: database-schema.md
    content: |
      # Database Schema
      Update after each migration.
