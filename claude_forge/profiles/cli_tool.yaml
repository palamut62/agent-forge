      myapp
      ├── komut-1          # Aciklama
      ├── komut-2          # Aciklama
      └── grup
          ├── alt-komut-1  # Aciklama
          └── alt-komut-2  # Aciklama
      ```

      ## Exit Codes
      | Kod | Anlam |
      |-----|-------|
      | 0   | Basarili |
      | 1   | Genel hata |
      | 2   | Kullanim hatasi |
      | 130 | Ctrl+C |

      ## Config
